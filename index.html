<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conquête des Territoires</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  [data-theme="dark"]{--bg:#07090d;--bg2:rgba(10,14,22,.85);--bone:#e8e3d6;--paper:#f0ead8;
    --dim:#8694a8;--vdim:#4a5566;--rule:rgba(232,227,214,.12);--rule2:rgba(232,227,214,.22);
    --overlay:rgba(7,9,13,.92);--grid-bg:radial-gradient(ellipse 80% 60% at 50% 35%,#182334,#0a0e15 55%,#03050a)}
  [data-theme="light"]{--bg:#e4dece;--bg2:rgba(190,180,160,.9);--bone:#18140e;--paper:#0e0a06;
    --dim:#4a4030;--vdim:#6a6050;--rule:rgba(40,30,15,.2);--rule2:rgba(40,30,15,.35);
    --overlay:rgba(180,170,150,.94);--grid-bg:radial-gradient(ellipse 80% 60% at 50% 35%,#d8cfb6,#c8c0aa 55%,#b0a890)}
  /* Textes dorés lisibles en mode clair */
  [data-theme="light"] .eyebrow,
  [data-theme="light"] .bm:hover,
  [data-theme="light"] .bd:hover,
  [data-theme="light"] .mss,
  [data-theme="light"] .hint,
  [data-theme="light"] h1 .ac { color:#5a4518 !important; }
  :root{--gold:#c9a961;--gold-b:#e8c878;--allies:#4a8db8;--axis:#a83232;
    --fd:"Cinzel",Georgia,serif;--fu:"Manrope",system-ui,sans-serif;--fm:"JetBrains Mono",monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--bone);font-family:var(--fu)}
  .stage{position:fixed;inset:0;background:var(--grid-bg);display:flex;flex-direction:column;align-items:center;overflow:hidden}
  .fx-grid{position:absolute;inset:0;pointer-events:none;
    background-image:linear-gradient(to right,rgba(201,169,97,.03) 1px,transparent 1px),linear-gradient(to bottom,rgba(201,169,97,.03) 1px,transparent 1px);
    background-size:80px 80px;mask-image:radial-gradient(ellipse 70% 60% at 50% 50%,black 30%,transparent 80%)}
  .fx-vig{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 65% 55% at 50% 45%,transparent 40%,rgba(0,0,0,.5) 80%,rgba(0,0,0,.95) 100%);z-index:2}
  [data-theme="light"] .fx-vig{background:radial-gradient(ellipse 65% 55% at 50% 45%,transparent 40%,rgba(80,60,30,.15) 80%)}
  .fx-brack{position:absolute;inset:20px;pointer-events:none;z-index:3}
  .fx-brack::before,.fx-brack::after,.fx-brack i::before,.fx-brack i::after{content:"";position:absolute;width:18px;height:18px;border:1px solid rgba(201,169,97,.45)}
  .fx-brack::before{top:0;left:0;border-right:0;border-bottom:0}
  .fx-brack::after{top:0;right:0;border-left:0;border-bottom:0}
  .fx-brack i{display:block} .fx-brack i::before{bottom:0;left:0;border-right:0;border-top:0;position:absolute}
  .fx-brack i::after{bottom:0;right:0;border-left:0;border-top:0;position:absolute}
  /* Particules */
  .mote{position:absolute;border-radius:50%;background:rgba(232,227,214,.5);filter:blur(.5px);
    box-shadow:0 0 6px rgba(232,227,214,.3);animation:drift linear infinite;opacity:0}
  @keyframes drift{0%{transform:translate(0,0);opacity:0}10%{opacity:.7}90%{opacity:.3}100%{transform:translate(var(--dx),var(--dy));opacity:0}}
  /* Chrome top - juste UTC + toggle */
  .chrome-top{position:absolute;top:0;left:0;right:0;padding:12px 24px;display:flex;align-items:center;justify-content:flex-end;gap:12px;
    font-family:var(--fm);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);z-index:10}
  .bi{background:none;border:1px solid var(--rule);cursor:pointer;width:30px;height:30px;display:flex;align-items:center;
    justify-content:center;color:var(--dim);font-size:14px;transition:all .2s}
  .bi:hover{color:var(--gold);border-color:var(--gold)}
  /* Contenu */
  .content{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;
    justify-content:center;height:100%;gap:8px;pointer-events:none}
  .content>*{pointer-events:auto}
  .eyebrow{font-family:var(--fm);font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);
    display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .eyebrow::before,.eyebrow::after{content:"";width:30px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent)}
  h1{font-family:var(--fd);font-weight:700;font-size:clamp(40px,6.5vw,96px);line-height:.95;text-align:center;
    color:var(--paper);text-shadow:0 1px 0 rgba(0,0,0,.4),0 0 50px rgba(255,220,160,.1)}
  h1 .ac{color:var(--gold-b);font-style:italic;font-weight:400}
  .rule-line{width:180px;height:1px;margin:14px auto;background:linear-gradient(to right,transparent,rgba(201,169,97,.6),transparent)}
  .sub{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:14px}
  .factions{display:flex;gap:20px;margin-bottom:20px}
  .fac{padding:10px 16px;border:1px solid var(--rule);border-left:3px solid var(--c);background:var(--bg2);min-width:160px}
  .fac .fl{font-family:var(--fm);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
  .fac .fn{font-family:var(--fd);font-size:18px;color:var(--paper)}
  .btn-play{position:relative;padding:18px 70px;font-family:var(--fd);font-weight:700;font-size:20px;
    letter-spacing:.4em;color:var(--paper);cursor:pointer;border:1px solid rgba(201,169,97,.5);
    background:linear-gradient(180deg,rgba(201,169,97,.15),rgba(201,169,97,.03)),var(--bg2);
    overflow:hidden;transition:all .4s;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 8px 30px rgba(0,0,0,.5)}
  .btn-play:hover{border-color:var(--gold-b);letter-spacing:.5em;box-shadow:0 0 40px rgba(232,200,120,.3),0 12px 40px rgba(0,0,0,.5)}
  .btn-play::after{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;
    background:linear-gradient(110deg,transparent 30%,rgba(232,200,120,.3) 50%,transparent 70%);transition:left .8s;pointer-events:none}
  .btn-play:hover::after{left:120%}
  .corner{position:absolute;width:9px;height:9px;border:1px solid var(--gold-b)}
  .tl{top:5px;left:5px;border-right:0;border-bottom:0} .tr{top:5px;right:5px;border-left:0;border-bottom:0}
  .bl{bottom:5px;left:5px;border-right:0;border-top:0} .br{bottom:5px;right:5px;border-left:0;border-top:0}
  .hint{font-family:var(--fm);font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--vdim);margin-top:10px}
  .hint kbd{display:inline-block;padding:2px 6px;border:1px solid var(--rule);background:rgba(255,255,255,.03);font-family:var(--fm);font-size:9px;margin:0 3px}
  /* Mode screen */
  #ms{display:none;position:fixed;inset:0;z-index:20;background:var(--overlay);
    flex-direction:column;align-items:center;justify-content:center;gap:12px}
  #ms.show{display:flex}
  .bm{min-width:280px;padding:14px 28px;font-family:var(--fd);font-size:13px;font-weight:600;
    letter-spacing:.16em;text-transform:uppercase;color:var(--bone);cursor:pointer;
    border:1px solid var(--rule2);background:linear-gradient(180deg,rgba(201,169,97,.06),transparent);transition:all .3s}
  .bm:hover{border-color:var(--gold);color:var(--paper);box-shadow:0 0 20px rgba(232,200,120,.3);letter-spacing:.22em}
  .bm .mm{display:block;font-family:var(--fm);font-size:7px;color:var(--dim);letter-spacing:.16em;margin-top:2px}
  .mss{font-family:var(--fm);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
  #dp{display:none;flex-direction:column;gap:5px;align-items:center}
  #dp.show{display:flex}
  .bd{min-width:200px;padding:7px 18px;font-family:var(--fm);font-size:9px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--bone);cursor:pointer;background:rgba(0,0,0,.12);border:1px solid var(--rule);transition:all .2s}
  .bd:hover{border-color:var(--gold);color:var(--gold)}
  .btn-back{background:none;border:none;color:var(--vdim);cursor:pointer;font-family:var(--fm);
    font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;margin-top:6px}
  .btn-back:hover{color:var(--bone)}
</style>
</head>
<body>
<div class="stage">
  <div class="fx-grid"></div><div class="fx-vig"></div><div class="fx-brack"><i></i></div>
  <div id="particles"></div>
  <div class="chrome-top">
    <span id="utc">UTC 00:00:00</span>
    <button class="bi" id="btn-son" onclick="SON.toggleMute()">🔊</button>
    <input type="range" id="vol-slider" min="0" max="100" value="50" oninput="SON.setVolume(this.value/100)" style="width:50px;height:3px;-webkit-appearance:none;appearance:none;background:rgba(232,227,214,.22);outline:none;cursor:pointer;vertical-align:middle"/>
    <button class="bi" id="bt" onclick="toggleTheme()" title="Thème">☀</button>
  </div>
  <div class="content">
    <div class="eyebrow">Commandement Stratégique</div>
    <h1>Conquête<br><span class="ac">des</span> Territoires</h1>
    <div class="rule-line"></div>
    <div class="factions">
      <div class="fac" style="--c:var(--allies)"><div class="fl">Commandement Bleu</div><div class="fn">Forces Alliées</div></div>
      <div class="fac" style="--c:var(--axis)"><div class="fl">Commandement Rouge</div><div class="fn">Puissances de l'Axe</div></div>
    </div>
    <button class="btn-play" onclick="showModes()"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>JOUER</button>
    <div class="hint">APPUYEZ SUR <kbd>ENTRÉE</kbd> OU CLIQUEZ</div>
  </div>
</div>
<div id="ms">
  <div class="eyebrow">Sélection du mode</div>
  <div class="mss">Choisissez votre mode d'opération</div>
  <button class="bm" onclick="go('jvj')">Joueur contre Joueur<span class="mm">PvP · Deux commandants</span></button>
  <button class="bm" onclick="showDiff()">Joueur contre Ordinateur<span class="mm">PvE · Intelligence tactique</span></button>
  <div id="dp"><div class="mss" style="margin:0">Niveau de l'IA</div>
    <button class="bd" onclick="go('jvo','facile')">🟢 Facile</button>
    <button class="bd" onclick="go('jvo','normal')">🟡 Normal</button>
    <button class="bd" onclick="go('jvo','difficile')">🔴 Difficile</button>
  </div>
  <button class="btn-back" onclick="hideModes()">◂ Retour</button>
</div>
<script src="js/son.js"></script>
<script>
setInterval(function(){var d=new Date();document.getElementById('utc').textContent='UTC '+
  String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0')+':'+String(d.getUTCSeconds()).padStart(2,'0');},1000);
(function(){var c=document.getElementById('particles');for(var i=0;i<20;i++){var m=document.createElement('span');m.className='mote';
  m.style.left=Math.random()*100+'%';m.style.top=(60+Math.random()*40)+'%';m.style.width=m.style.height=(1+Math.random()*2)+'px';
  m.style.animationDuration=(10+Math.random()*16)+'s';m.style.animationDelay=(-Math.random()*16)+'s';
  m.style.setProperty('--dx',(Math.random()-.5)*80+'px');m.style.setProperty('--dy',-(60+Math.random()*160)+'px');c.appendChild(m);}})();
function toggleTheme(){var h=document.documentElement;var t=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',t);document.getElementById('bt').textContent=t==='dark'?'☀':'🌙';}
function showModes(){document.getElementById('ms').classList.add('show');}
function hideModes(){document.getElementById('ms').classList.remove('show');document.getElementById('dp').classList.remove('show');}
function showDiff(){document.getElementById('dp').classList.add('show');}
// Redirige vers la page carte (sélection de pays) au lieu du jeu directement
function go(mode,diff){var url='carte.html?mode='+mode;if(diff)url+='&diff='+diff;window.location.href=url;}
document.addEventListener('keydown',function(e){if(e.key==='Enter')showModes();if(e.key==='Escape')hideModes();});
SON.lancerMusique('sons/musique.mp3');
</script>
</body>
</html>
